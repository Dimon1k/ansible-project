- name: Setup Web Servers
  hosts: webservers
  become: yes

  tasks:

    - name: Install Apache on Ubuntu
      apt:
        name: apache2
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install Apache on CentOS
      dnf:
        name: httpd
        state: present
      when: ansible_os_family == "RedHat"

    - name: Start Apache on Ubuntu
      service:
        name: apache2
        state: started
        enabled: yes
      when: ansible_os_family == "Debian"

    - name: Start Apache on CentOS
      service:
        name: httpd
        state: started
        enabled: yes
      when: ansible_os_family == "RedHat"

    - name: Deploy HTML template
      template:
        src: index.html.j2
        dest: /var/www/html/index.html

    - name: Deploy CSS
      copy:
        src: style.css
        dest: /var/www/html/style.css

    - name: Deploy JS
      copy:
        src: script.js
        dest: /var/www/html/script.js  
